name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1 — unit + e2e tests (no external service needed)
  # ---------------------------------------------------------------------------
  test-phase1:
    name: Phase 1 tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pytest pytest-cov -e phase1-no-opa/
      - name: Run Phase 1 tests
        run: |
          python -m pytest \
            tests/test_phase1_rules.py \
            tests/test_phase1_permission.py \
            tests/test_phase1_e2e_scenarios.py \
            -v --tb=short \
            --cov=phase1-no-opa/src \
            --cov-report=term-missing \
            --cov-report=xml:coverage-phase1.xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-phase1
          path: coverage-phase1.xml

  # ---------------------------------------------------------------------------
  # Phase 2 — unit tests (OPA mocked) + e2e tests (OPA via Docker)
  # ---------------------------------------------------------------------------
  test-phase2:
    name: Phase 2 tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pytest pytest-cov -e phase2-opa/
      - name: Run Phase 2 unit tests (OPA mocked)
        run: |
          python -m pytest \
            tests/test_phase2_opa.py \
            -v --tb=short \
            --cov=phase2-opa/src \
            --cov-report=term-missing \
            --cov-report=xml:coverage-phase2-unit.xml
      - name: Start OPA via Docker Compose
        run: |
          cd phase2-opa/docker
          docker compose up -d opa opa-init
          docker wait rucio-opa-init
      - name: Run Phase 2 e2e tests (live OPA)
        env:
          OPA_URL: http://localhost:8181
        run: |
          python -m pytest \
            tests/test_phase2_e2e_scenarios.py \
            -v --tb=short
      - name: Tear down OPA
        if: always()
        run: cd phase2-opa/docker && docker compose down
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-phase2-unit
          path: coverage-phase2-unit.xml

  # ---------------------------------------------------------------------------
  # Phase 3 — unit tests (OPA mocked) + e2e tests (OPA via Docker)
  # ---------------------------------------------------------------------------
  test-phase3:
    name: Phase 3 tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pytest pytest-cov -e phase3-opa/
      - name: Run Phase 3 unit tests (OPA mocked)
        run: |
          python -m pytest \
            tests/test_phase3_opa.py \
            -v --tb=short \
            --cov=phase3-opa/src \
            --cov-report=term-missing \
            --cov-report=xml:coverage-phase3-unit.xml
      - name: Start OPA via Docker Compose
        run: |
          cd phase3-opa/docker
          docker compose up -d opa opa-init
          docker wait rucio-opa-init
      - name: Run Phase 3 e2e tests (live OPA)
        env:
          OPA_URL: http://localhost:8181
        run: |
          python -m pytest \
            tests/test_phase3_e2e_scenarios.py \
            -v --tb=short
      - name: Tear down OPA
        if: always()
        run: cd phase3-opa/docker && docker compose down
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-phase3-unit
          path: coverage-phase3-unit.xml

  # ---------------------------------------------------------------------------
  # Phase 4 — e2e tests (OPA + Keycloak via Docker)
  # No unit test job: Phase 4 has no mocked tests — the core logic is the
  # group_policy bundle evaluation which requires a live OPA.
  # ---------------------------------------------------------------------------
  test-phase4:
    name: Phase 4 tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pytest -e phase4-opa/
      - name: Start OPA + Keycloak via Docker Compose
        run: |
          cd phase4-opa/docker
          docker compose up -d opa opa-init keycloak
          docker wait rucio-opa-init
          echo "Waiting for Keycloak to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health/ready || echo "000")
            [ "$STATUS" = "200" ] && echo "Keycloak ready." && break
            echo "  attempt $i/30 — HTTP $STATUS"
            sleep 5
          done
      - name: Run Phase 4 e2e tests (live OPA)
        env:
          OPA_URL: http://localhost:8181
        run: |
          python -m pytest \
            tests/test_phase4_e2e_scenarios.py \
            -v --tb=short
      - name: Tear down
        if: always()
        run: cd phase4-opa/docker && docker compose down

  # ---------------------------------------------------------------------------
  # Smoke tests — full stack (OPA + PostgreSQL + Rucio) per phase
  # Phase 2, 3 and 4 run sequentially to avoid port conflicts on :80 / :8181.
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Full stack smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Phase 2 — start full stack
        run: |
          cd phase2-opa/docker
          docker compose --profile full up -d
          docker wait rucio-opa-init
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' rucio-server 2>/dev/null || echo "starting")
            [ "$STATUS" = "healthy" ] && echo "Rucio healthy." && break
            echo "  attempt $i/30 — $STATUS"; sleep 5
          done
      - name: Phase 2 — run smoke tests
        run: cd phase2-opa/docker && bash smoke_test.sh
      - name: Phase 2 — tear down
        if: always()
        run: cd phase2-opa/docker && docker compose --profile full down -v

      - name: Phase 3 — start full stack
        run: |
          cd phase3-opa/docker
          docker compose --profile full up -d
          docker wait rucio-opa-init
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' rucio-server 2>/dev/null || echo "starting")
            [ "$STATUS" = "healthy" ] && echo "Rucio healthy." && break
            echo "  attempt $i/30 — $STATUS"; sleep 5
          done
      - name: Phase 3 — run smoke tests
        run: cd phase3-opa/docker && bash smoke_test.sh
      - name: Phase 3 — tear down
        if: always()
        run: cd phase3-opa/docker && docker compose --profile full down -v

      - name: Phase 4 — start full stack
        run: |
          cd phase4-opa/docker
          docker compose --profile full up -d
          docker wait rucio-opa-init
          echo "Waiting for Keycloak..."
          for i in $(seq 1 36); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health/ready || echo "000")
            [ "$STATUS" = "200" ] && echo "Keycloak ready." && break
            echo "  attempt $i/36 — HTTP $STATUS"; sleep 5
          done
          echo "Waiting for Rucio..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' rucio-server 2>/dev/null || echo "starting")
            [ "$STATUS" = "healthy" ] && echo "Rucio healthy." && break
            echo "  attempt $i/30 — $STATUS"; sleep 5
          done
      - name: Phase 4 — run smoke tests
        run: cd phase4-opa/docker && bash smoke_test.sh
      - name: Phase 4 — tear down
        if: always()
        run: cd phase4-opa/docker && docker compose --profile full down -v

  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit hooks
        run: pre-commit run --all-files
