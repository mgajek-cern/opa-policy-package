[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
pythonpath = ["phase1-no-opa/src", "phase2-opa/src"]

[tool.ruff]
target-version = "py39"
line-length = 100
src = ["phase1-no-opa/src", "phase2-opa/src", "tests"]
exclude = [".git", ".venv", "__pycache__", "build", "dist"]

[tool.ruff.lint]
select = [
    "E", "W",   # pycodestyle
    "F",        # pyflakes
    "I",        # isort
    "N",        # pep8-naming
    "S",        # bandit
    "TC",       # type-checking imports
    "UP",       # pyupgrade
    "B",        # bugbear
    "SIM",      # simplify
]
ignore = [
    "E501",  # line too long — handled by ruff-format
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]  # assert statements are fine in tests

[tool.ruff.lint.isort]
known-first-party = ["rucio_no_opa_policy", "rucio_opa_policy"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
