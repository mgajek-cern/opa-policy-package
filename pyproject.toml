[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
pythonpath = ["phase1-no-opa/src", "phase2-opa/src"]

[tool.ruff]
target-version = "py39"
line-length = 100
src = ["phase1-no-opa/src", "phase2-opa/src", "tests"]
exclude = [".git", ".venv", "__pycache__", "build", "dist"]

[tool.ruff.lint]
select = [
    "E", "W",   # pycodestyle
    "F",        # pyflakes
    "I",        # isort
    "N",        # pep8-naming
    "S",        # bandit
    "TC",       # type-checking imports
    "UP",       # pyupgrade
    "B",        # bugbear
    "SIM",      # simplify
]
ignore = [
    "E501",  # line too long — handled by ruff-format
    "S310",  # urllib.urlopen — all uses talk to a trusted local OPA endpoint
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = [
    "S101",  # assert statements are expected in tests
    "S105",  # hardcoded password strings (test fixtures)
    "S106",  # hardcoded password function arguments
    "S311",  # non-cryptographic random usage in tests is fine
    "N801",  # test class names use underscores for group readability (TestScenario_X)
    "N802",  # test method names use uppercase group labels (test_A1_..., test_B2_...)
]
"tests/test_phase2_e2e_scenarios.py" = [
    "S603",  # subprocess call is a controlled test fixture spawning a known binary
    "S607",  # partial executable path (opa) is intentional — resolved via PATH
]

[tool.ruff.lint.isort]
known-first-party = ["rucio_no_opa_policy", "rucio_opa_policy"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
