[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.ruff]
target-version = "py39"          # lowest supported Python
line-length = 100
src = ["phase1-no-opa/src", "phase2-opa/src", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
]
ignore = [
    "E501",  # line too long — handled by ruff-format
]

[tool.ruff.lint.isort]
known-first-party = ["rucio_no_opa_policy", "rucio_opa_policy"]
